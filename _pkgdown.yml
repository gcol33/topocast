url: https://gillescolling.com/topocast/
template:
  bootstrap: 5
  light-switch: yes
  includes:
    in_header: |
      <script>
      (function () {
        var D = String.fromCharCode(36);
        window.MathJax = {
          tex: {
            inlineMath: [[D, D], ["\\(", "\\)"]],
            displayMath: [[D + D, D + D], ["\\[", "\\]"]]
          },
          chtml: { linebreaks: { automatic: true, width: "90% container" } },
          svg: { linebreaks: { automatic: true, width: "90% container" } },
          options: { renderActions: { addMenu: [] } }
        };
      })();
      </script>
figures:
  dev: svglite
  fig.ext: svg
  bg: '#F5F6F8'
reference:
- title: Downscaling
  desc: Downscale a coarse raster onto fine terrain.
  contents: topocast
- title: Engine
  desc: The terra-free matrix kernel.
  contents: window_regression
articles:
- title: Articles
  navbar: ~
  contents:
  - getting-started
  - how-it-works
